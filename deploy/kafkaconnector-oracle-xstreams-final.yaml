apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: oracle-xstream-connector
  namespace: strimzi
  labels:
    strimzi.io/cluster: debezium-connect
spec:
  class: io.debezium.connector.oracle.OracleConnector
  tasksMax: 1
  state: stopped
  config:
    # Database connection - Using full connection descriptor (bypasses tnsnames.ora)
    # Must use jdbc:oracle:oci:@ prefix for XStreams (NOT jdbc:oracle:thin:@)
    # Full descriptor directly specifies HOST, PORT, and SERVICE_NAME
    database.url: "jdbc:oracle:oci:@(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=oracle-db)(PORT=1521))(CONNECT_DATA=(SERVER=DEDICATED)(SERVICE_NAME=ORCLCDB)))"
    database.user: c##dbzuser
    database.password: dbz
    database.dbname: ORCLCDB

    # XStreams adapter configuration
    database.connection.adapter: xstream
    database.out.server.name: dbzxout

    # Topic prefix
    topic.prefix: oracle-xstream

    # Schema and table filtering
    schema.include.list: C##DBZUSER
    table.include.list: C##DBZUSER.CUSTOMERS

    # Schema history
    schema.history.internal.kafka.bootstrap.servers: kafka-cluster-kafka-bootstrap:9092
    schema.history.internal.kafka.topic: schema-changes.oracle.xstream

    # Snapshot mode
    snapshot.mode: initial

    # Tombstone events
    tombstones.on.delete: true

    # Decimal and time handling
    decimal.handling.mode: precise
    time.precision.mode: adaptive_time_microseconds
